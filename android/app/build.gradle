plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

/* Exclusions de dépendances optionnelles */
configurations.all {
    exclude group: 'com.github.jiangdongguo.AndroidUSBCamera'
    exclude group: 'androidx.media3', module: 'media3-exoplayer-rtsp'
}

/* Chargement des propriétés locales */
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

/* Chargement des propriétés de signature */
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.unistudious.projet1v2"
    compileSdkVersion 35
    ndkVersion "28.2.13676358"  // NDK r28+ pour support 16 KB (Google Play)

    packagingOptions {
        pickFirsts += ['lib/**/libc++_shared.so']
        jniLibs {
            useLegacyPackaging = true  // Contourne 16KB: libs compressées (plugins pré-compilés non alignés)
        }
    }

    defaultConfig {
        applicationId "com.unistudious.projet1v2"
        minSdkVersion 26
        targetSdkVersion flutter.targetSdkVersion
        versionCode 19
        versionName "1.0.17"
    }

    /* ✅ OBLIGATOIRE pour flutter_local_notifications */
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword keystoreProperties["storePassword"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'
        }

        debug {
            signingConfig signingConfigs.debug
        }
    }
}

/* ✅ DÉPENDANCE DESUGARING OBLIGATOIRE */
dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
    
    // Firebase Messaging - nécessaire pour le service personnalisé
    // Les plugins Flutter gèrent déjà Firebase, mais on a besoin des classes pour le service Kotlin
    implementation(platform("com.google.firebase:firebase-bom:33.16.0"))
    implementation("com.google.firebase:firebase-messaging")
}

flutter {
    source '../..'
}
