plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

/* Exclusions de dépendances optionnelles */
configurations.all {
    exclude group: 'com.github.jiangdongguo.AndroidUSBCamera'
    exclude group: 'androidx.media3', module: 'media3-exoplayer-rtsp'
}

/* Chargement des propriétés locales */
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

/* Chargement des propriétés de signature */
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.unistudious.projet1v2"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    packagingOptions {
        pickFirsts += ['lib/**/libc++_shared.so']
    }

    defaultConfig {
        applicationId "com.unistudious.projet1v2"
        minSdkVersion 26
        targetSdkVersion flutter.targetSdkVersion
        versionCode 6
        versionName "1.0.3"
    }

    /* ✅ OBLIGATOIRE pour flutter_local_notifications */
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword keystoreProperties["storePassword"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'
        }

        debug {
            signingConfig signingConfigs.debug
        }
    }
}

/* ✅ DÉPENDANCE DESUGARING OBLIGATOIRE */
dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}

flutter {
    source '../..'
}
