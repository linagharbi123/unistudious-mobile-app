name: projet1
description: "Unistudious - Plateforme d'apprentissage en ligne connectant étudiants et éducateurs pour des expériences d'apprentissage interactives avec cours, chat, réseaux sociaux éducatifs et ressources pédagogiques."
publish_to: 'none'
version: 1.0.27+29

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.0.0
  image_picker: ^1.0.2
  image_picker_android: ^0.8.12
  google_sign_in: ^6.1.6
  table_calendar: ^3.0.9
  intl: ^0.20.2
  video_player: ^2.8.6
  url_launcher: ^6.3.0
  flutter_linkify: ^6.0.0
  path_provider: ^2.1.4
  path: ^1.8.3
  cupertino_icons: ^1.0.2
  webview_flutter: ^4.0.0
  audioplayers: ^6.1.0
  just_audio: ^0.9.40
  flutter_pdfview: ^1.4.4
  open_file: ^3.5.10
  permission_handler: ^11.0.0
  flutter_secure_storage: ^9.2.4
  flutter_facebook_auth: ^6.0.4
  cached_network_image: ^3.2.0
  flutter_spinkit: ^5.2.0
  sign_in_with_apple: ^6.0.0
  crypto: ^3.0.3
  jitsi_meet_flutter_sdk: ^11.6.0
  lottie: ^2.7.0
  responsive_framework: ^1.5.1
  html: ^0.15.4
  clipboard: ^0.1.3
  image: ^4.2.0
  fl_chart: ^0.63.0
  animate_do: ^3.3.4
  share_plus: ^10.0.0
  syncfusion_flutter_pdfviewer: 28.2.7
  file_picker: ^8.1.2
  flutter_svg: ^2.0.7
  google_fonts: ^6.2.1
  mime: ^1.0.5
  web_socket_channel: ^3.0.1
  record: ^5.2.1
  package_info_plus: ^8.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  mobile_scanner: 6.0.2
  flutter_localizations:
    sdk: flutter

dependency_overrides:
  # Utiliser la dernière implémentation Linux du plugin record depuis Git (corrige startStream)
  record_linux:
    git:
      url: https://github.com/llfbandit/record.git
      path: record_linux







dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1  # Ajout pour générer les icônes

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png" # Ton image d'icône (1024x1024 px recommandé)
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/account.png
    - assets/session.png
    - assets/student.png
    - assets/centre.png
    - assets/meeting_image.png
    - assets/success.json
    - assets/Books stack.json
    - assets/log.png
    - assets/msg light.png
    - assets/msg dark.png
    - assets/google.png